<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The 10-Year Investment Challenge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .wheel-container { position: relative; width: 280px; height: 280px; margin: 0 auto; }
        .wheel-pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent; border-top: 30px solid #1e293b; z-index: 10; filter: drop-shadow(0 4px 3px rgb(0 0 0 / 0.2)); }
        .wheel { width: 100%; height: 100%; border-radius: 50%; border: 6px solid #e2e8f0; box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.1), inset 0 0 15px rgb(0 0 0 / 0.1); transition: transform 3s cubic-bezier(0.25, 0.1, 0.25, 1); }
        .wheel-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; background: #ffffff; border: 4px solid #e2e8f0; border-radius: 50%; box-shadow: 0 2px 4px rgb(0 0 0 / 0.1); z-index: 5; }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex items-center justify-center p-4">

    <div id="app" class="w-full max-w-6xl bg-white rounded-2xl shadow-xl overflow-hidden min-h-[600px] flex flex-col relative">
        <header class="bg-slate-900 text-white p-6 text-center z-10">
            <h1 class="text-2xl md:text-3xl font-bold tracking-tight">The 10-Year Investment Challenge</h1>
            <p class="text-slate-400 mt-2 text-sm md:text-base">A 10-Year Interactive Lesson on Interest & Risk</p>
        </header>
        <main id="content" class="p-6 md:p-10 flex-grow flex flex-col justify-center items-center fade-in bg-slate-50 relative overflow-hidden w-full"></main>
    </div>

    <script>
        // --- STATE MANAGEMENT ---
        const state = {
            view: 'intro',
            initialBalance: 300000,
            currentBalance: 300000,
            stage1Choice: null, stage1Logs: [],
            stage2Choice: null, stage2Working: "", stage2Logs: [],
            stage3Choice: null, stage3Logs: [], finalBalance: 0,
            stage3PendingChoice: null,
            verifications: { stage1: false, stage2: false, stage3_lesson: false, stage3: false, rec_stage2_sel: false, rec_stage3_sel: false },
            calcInputs: { stage2: "", stage3safe: "", wheel: "" },
            showStage2Hint: false, showStage2Hints: false,
            stage3AnalyzerError: false, stage3AnalyzerErrorMsg: '', stage2CalcError: false, stage2CalcErrorMsg: '', stage3SafeCalcError: false,
            analyzerCorrectS: null, analyzerCorrectD: null,
            analyzerSStatus: null, analyzerDStatus: null,
            analyzerSInput: '', analyzerDInput: '',
            analyzerSErrorMsg: '', analyzerDErrorMsg: '',
            stage2AnnualStatus: null, stage2MonthlyStatus: null,
            stage2AnnualErrorMsg: '', stage2MonthlyErrorMsg: '',
            stage2BothCorrect: false, stage2AnnualInput: '', stage2MonthlyInput: '',
            pendingStage2Logs: [], pendingStage2Bal: 0,
            pendingStage3Logs: [], pendingStage3Bal: 0,
            wheelData: {
                fundId: null, fundName: "", year: 2033,
                currentPrincipal: 0, accumulatedInterest: 0, bal: 0,
                isSpinning: false, currentRotation: 0, riskPct: 10,
                slicePattern: [], awaitingCalculation: false,
                pendingOutcome: null, calcError: false
            },
            previousRuns: []
        };

        // --- UTILS ---
        const formatMoney = (amount) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(amount);
        const FORMULA_LATEX = 'A = P\\left(1 + \\dfrac{r}{100}\\right)^{n}';
        const tex = (latex, display = false) => {
            if (typeof katex === 'undefined') return `<span class="font-mono font-bold">${latex.replace(/\\/g,'')}</span>`;
            return katex.renderToString(latex, { throwOnError: false, displayMode: display });
        };

        const backBtn = (view) => `
            <button onclick="changeView('${view}')" class="text-slate-500 hover:text-slate-700 font-semibold text-sm inline-flex items-center mb-4 transition-colors group">
                <svg class="w-4 h-4 mr-1 transition-transform group-hover:-translate-x-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                Back
            </button>
        `;

        const getFundName = (id) => {
            if (id === 'A') return 'Secure Haven (2.5% Guaranteed)';
            if (id === 'B') return 'Market Accel (5.0%, 20% Risk)';
            if (id === 'C') return 'Fun Tech (45.0%, 60% Risk)';
            return '';
        };

        const getWheelGradient = (slicePattern) => {
            if (!slicePattern || slicePattern.length === 0) return '';
            const degPerSlice = 36;
            const gap = 2; // white divider width in degrees
            let grad = `conic-gradient(from -18deg`;
            let currentDeg = 0;
            slicePattern.forEach((type) => {
                const color = type === 'red' ? '#ef4444' : (type === 'green1' ? '#22c55e' : '#16a34a');
                grad += `, ${color} ${currentDeg}deg ${currentDeg + degPerSlice - gap}deg`;
                grad += `, white ${currentDeg + degPerSlice - gap}deg ${currentDeg + degPerSlice}deg`;
                currentDeg += degPerSlice;
            });
            grad += ')';
            return grad;
        };

        const toggleVerification = (stage) => {
            const checkbox = document.getElementById(`verify-${stage}`);
            state.verifications[stage] = checkbox.checked;
            const btn = document.getElementById(`btn-${stage}`);
            if(btn) {
                if (state.verifications[stage]) { btn.disabled = false; btn.classList.remove('opacity-50', 'cursor-not-allowed'); btn.classList.add('hover:scale-105'); }
                else { btn.disabled = true; btn.classList.add('opacity-50', 'cursor-not-allowed'); btn.classList.remove('hover:scale-105'); }
            }
        };

        const toggleSelectionBtns = (stageKey, checkboxId, btnClassIds) => {
            const checkbox = document.getElementById(checkboxId);
            state.verifications[stageKey] = checkbox.checked;
            btnClassIds.forEach(btnId => {
                const btn = document.getElementById(btnId);
                if(btn) {
                    if (checkbox.checked) { btn.disabled = false; btn.classList.remove('opacity-50', 'cursor-not-allowed'); }
                    else { btn.disabled = true; btn.classList.add('opacity-50', 'cursor-not-allowed'); }
                }
            });
        };

        const render = () => {
            const content = document.getElementById('content');
            content.className = 'p-6 md:p-10 flex-grow flex flex-col justify-center fade-in bg-slate-50 w-full';
            content.style.animation = 'none';
            content.offsetHeight;
            content.style.animation = null;
            switch(state.view) {
                case 'intro': content.innerHTML = introView(); break;
                case 'stage1': content.innerHTML = stage1View(); break;
                case 'stage1_wrong': content.innerHTML = stage1WrongView(); break;
                case 'stage1_correct': content.innerHTML = stage1CorrectView(); break;
                case 'stage2': content.innerHTML = stage2View(); break;
                case 'stage2_wrong': content.innerHTML = stage2WrongView(); break;
                case 'stage2_calc': content.innerHTML = stage2CalcView(); break;
                case 'stage2_correct': content.innerHTML = stage2CorrectView(); break;
                case 'stage3_lesson': content.innerHTML = stage3LessonView(); break;
                case 'stage3': content.innerHTML = stage3View(); break;
                case 'stage3_safe_calc': content.innerHTML = stage3SafeCalcView(); break;
                case 'stage3_wheel': content.innerHTML = stage3WheelView(); break;
                case 'final_result': content.innerHTML = finalResultView(); setTimeout(drawComparisonChart, 100); break;
                case 'final_reflection': content.innerHTML = finalReflectionView(); break;
            }
        };

        // --- ICONS ---
        const icons = {
            shield: `<svg class="w-12 h-12 text-blue-500 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>`,
            sprout: `<svg class="w-12 h-12 text-green-500 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path></svg>`,
            rocket: `<svg class="w-12 h-12 text-orange-500 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>`,
            bank: `<svg class="w-12 h-12 text-indigo-500 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 6l9-4 9 4M4 10h16v8H4zm2 0v8m12-8v8M4 22h16"></path></svg>`,
            chart: `<svg class="w-12 h-12 text-teal-500 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"></path></svg>`,
            spin: `<svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>`
        };

        // --- VIEWS ---

        const introView = () => `
            <div class="max-w-2xl mx-auto w-full text-center bg-white p-10 rounded-2xl shadow-sm border border-slate-100">
                <h2 class="text-3xl font-bold mb-4">Your Base Capital: <span class="text-green-600">${formatMoney(state.initialBalance)}</span></h2>
                <p class="text-lg text-slate-600 mb-8 leading-relaxed">
                    Your goal is to learn how to grow your wealth over a <strong>10-Year Journey (2026 – 2035)</strong>.
                    <br><br>Your total balance will <strong>carry over</strong> from stage to stage. You will face 3 different scenarios testing your knowledge on interest types, compounding frequencies, and risk management. Let's see how much you can end up with!
                </p>
                <button onclick="changeView('stage1')" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-full shadow-lg transition-transform transform hover:scale-105 text-lg">
                    Begin Stage 1 (2026 – 2030)
                </button>
            </div>
        `;

        // ==========================================
        // STAGE 1: OBSERVATION
        // ==========================================
        const stage1View = () => `
            <div class="max-w-5xl mx-auto w-full text-center">
                ${backBtn('intro')}
                <div class="mb-10">
                    <span class="bg-slate-200 text-slate-800 px-3 py-1 rounded-full text-sm font-bold tracking-wide uppercase mb-3 inline-block">The Observation Test</span>
                    <h2 class="text-3xl font-bold mb-2">Stage 1: 2026 – 2030 (5 Years)</h2>
                    <p class="text-slate-600 max-w-2xl mx-auto">
                        Your goal is to lock your money in for 5 years to get the highest return on your <strong class="text-green-600">${formatMoney(state.currentBalance)}</strong>.
                        <strong>Without using a calculator</strong>, simply observe the options below. Which fund will obviously yield the most money?
                    </p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="border-2 border-slate-200 rounded-xl p-6 hover:border-blue-500 transition-all shadow-sm hover:shadow-md bg-white flex flex-col items-center text-center cursor-pointer group" onclick="processStage1('A')">
                        <div class="bg-blue-100 group-hover:bg-blue-200 transition-colors p-4 rounded-full mb-4 text-blue-600"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 17h8m0 0V9m0 8l-8-8-4 4-6-6"></path></svg></div>
                        <h3 class="text-xl font-bold mb-1">Fund A: Horizon</h3>
                        <div class="text-2xl font-black text-blue-700 mb-1">2.0% <span class="text-lg font-bold">p.a.</span></div>
                        <div class="text-sm font-semibold text-blue-600 mb-4 uppercase tracking-wide">Simple Interest</div>
                        <button class="w-full bg-blue-600 text-white font-semibold py-2 rounded-lg mt-auto hover:bg-blue-700 transition">Select</button>
                    </div>
                    <div class="border-2 border-slate-200 rounded-xl p-6 hover:border-emerald-500 transition-all shadow-sm hover:shadow-md bg-white flex flex-col items-center text-center cursor-pointer group" onclick="processStage1('B')">
                        <div class="bg-emerald-100 group-hover:bg-emerald-200 transition-colors p-4 rounded-full mb-4 text-emerald-600"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg></div>
                        <h3 class="text-xl font-bold mb-1">Fund B: Zenith</h3>
                        <div class="text-2xl font-black text-emerald-700 mb-1">5.0% <span class="text-lg font-bold">p.a.</span></div>
                        <div class="text-sm font-semibold text-emerald-600 mb-4 uppercase tracking-wide">Simple Interest</div>
                        <button class="w-full bg-emerald-600 text-white font-semibold py-2 rounded-lg mt-auto hover:bg-emerald-700 transition">Select</button>
                    </div>
                    <div class="border-2 border-slate-200 rounded-xl p-6 hover:border-purple-500 transition-all shadow-sm hover:shadow-md bg-white flex flex-col items-center text-center cursor-pointer group" onclick="processStage1('C')">
                        <div class="bg-purple-100 group-hover:bg-purple-200 transition-colors p-4 rounded-full mb-4 text-purple-600"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 11l7-7 7 7M5 19l7-7 7 7"></path></svg></div>
                        <h3 class="text-xl font-bold mb-1">Fund C: Apex</h3>
                        <div class="text-2xl font-black text-purple-700 mb-1">5.0% <span class="text-lg font-bold">p.a.</span></div>
                        <div class="text-sm font-semibold text-purple-600 mb-4 uppercase tracking-wide">Compound Interest</div>
                        <button class="w-full bg-purple-600 text-white font-semibold py-2 rounded-lg mt-auto hover:bg-purple-700 transition">Select</button>
                    </div>
                </div>
            </div>
        `;

        const stage1WrongView = () => `
            <div class="max-w-2xl mx-auto text-center bg-white p-10 rounded-2xl shadow-sm border border-red-100">
                <div class="bg-red-100 text-red-600 rounded-full w-20 h-20 flex items-center justify-center mx-auto mb-6">
                    <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </div>
                <h2 class="text-2xl font-bold mb-4 text-slate-800">Not the most optimal choice!</h2>
                <p class="text-slate-600 mb-8 leading-relaxed text-left bg-slate-50 p-6 rounded-xl border border-slate-200">
                    You are looking for the highest return. First, notice that <strong>5.0% p.a.</strong> is clearly better than 2.0% p.a., which rules out Fund A.<br><br>
                    Now, between Fund B and Fund C, the rate is exactly the same. However, look closely at the interest type:<br>
                    &bull; <strong>Simple Interest</strong> only calculates interest based on your original principal.<br>
                    &bull; <strong>Compound Interest</strong> calculates interest on your original principal <em>plus</em> any interest you have already earned in previous years.<br><br>
                    Which mechanic will snowball into more wealth over time?
                </p>
                <button onclick="changeView('stage1')" class="bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 px-8 rounded-xl w-full max-w-sm mx-auto transition">
                    Try Again
                </button>
            </div>
        `;

        const stage1CorrectView = () => {
            const logHTML = state.stage1Logs.map(log => `
                <tr class="border-b hover:bg-slate-50 transition-colors">
                    <td class="px-4 py-3 text-sm font-bold text-slate-700 text-center">${log.year}</td>
                    <td class="px-4 py-3 text-sm text-slate-600 whitespace-nowrap">${formatMoney(log.startBalance)}</td>
                    <td class="px-4 py-3 w-1/2">
                        <code class="text-xs font-mono text-slate-700 bg-slate-100 px-3 py-1.5 rounded-lg border border-slate-200 block whitespace-nowrap overflow-x-auto">${log.working}</code>
                    </td>
                    <td class="px-4 py-3 w-1/2">
                        <code class="text-xs font-mono text-purple-700 bg-purple-50 px-3 py-1.5 rounded-lg border border-purple-100 block whitespace-nowrap overflow-x-auto">${log.formulaWorking}</code>
                    </td>
                    <td class="px-4 py-3 text-sm font-bold text-slate-900 text-right whitespace-nowrap">${formatMoney(log.endBalance)}</td>
                </tr>
            `).join('');

            return `
                <div class="max-w-5xl mx-auto w-full">
                    ${backBtn('stage1')}
                    <div class="text-center mb-8">
                        <div class="bg-green-100 text-green-600 rounded-full w-16 h-16 flex items-center justify-center mx-auto mb-4">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                        <h2 class="text-3xl font-bold mb-2">Excellent Observation!</h2>
                        <p class="text-slate-600 max-w-2xl mx-auto">
                            Fund C is the winner! At the same 5% rate, <strong>Compound Interest</strong> outperforms Simple Interest because your generated interest begins to generate its own interest in subsequent years.
                        </p>
                    </div>
                    <div class="mb-8 overflow-x-auto bg-white rounded-2xl shadow-sm border border-slate-200 w-full custom-scrollbar">
                        <div class="bg-purple-50 px-6 py-4 border-b border-purple-100 flex justify-between items-center">
                            <h3 class="font-extrabold text-purple-900 text-lg">2026 – 2030 Growth (Fund C)</h3>
                            <span class="text-xs font-bold text-purple-700 uppercase tracking-wider">Formula: ${tex(FORMULA_LATEX)}</span>
                        </div>
                        <table class="w-full text-left border-collapse min-w-[800px]">
                            <thead class="bg-slate-50 text-slate-600 border-b border-slate-200">
                                <tr>
                                    <th class="px-4 py-3 text-xs font-bold uppercase text-center w-16">Year</th>
                                    <th class="px-4 py-3 text-xs font-bold uppercase whitespace-nowrap">Start Balance</th>
                                    <th class="px-4 py-3 text-xs font-bold uppercase">Step-by-Step Working</th>
                                    <th class="px-4 py-3 text-xs font-bold uppercase text-purple-700">Direct Formula (n = years)</th>
                                    <th class="px-4 py-3 text-xs font-bold uppercase text-right whitespace-nowrap">End Balance</th>
                                </tr>
                            </thead>
                            <tbody>${logHTML}</tbody>
                        </table>
                    </div>

                    <div class="bg-white border-2 border-indigo-100 p-8 rounded-2xl mb-8 text-left shadow-sm relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-2 h-full bg-indigo-500"></div>
                        <h4 class="font-extrabold text-indigo-800 flex items-center mb-2 text-xl">
                            <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                            SLS Task: Record Your Reasoning
                        </h4>
                        <p class="text-slate-600 mb-4">Why did Fund C (Compound Interest) earn more than Fund B (Simple Interest) even though the rates were the same? Explain in your own words <strong>in the SLS platform</strong>.</p>
                        <label class="flex items-center space-x-3 cursor-pointer p-4 bg-slate-50 border border-slate-200 rounded-xl hover:bg-slate-100 transition">
                            <input type="checkbox" id="verify-stage1" onchange="toggleVerification('stage1')" ${state.verifications.stage1 ? 'checked' : ''} class="w-6 h-6 text-indigo-600 bg-white border-slate-300 rounded focus:ring-indigo-500">
                            <span class="text-slate-700 font-semibold">I verify that I have submitted my explanation in the SLS tab.</span>
                        </label>
                    </div>

                    <div class="bg-gradient-to-r from-purple-900 to-indigo-900 text-white p-8 rounded-2xl flex flex-col md:flex-row justify-between items-center shadow-lg">
                        <div>
                            <p class="text-purple-200 text-sm font-semibold uppercase tracking-wider">Balance After Stage 1 (End of 2030)</p>
                            <h3 class="text-4xl font-bold mt-2 text-white">${formatMoney(state.currentBalance)}</h3>
                        </div>
                        <button id="btn-stage1" ${state.verifications.stage1 ? '' : 'disabled'} onclick="changeView('stage2')" class="mt-6 md:mt-0 bg-white text-indigo-900 font-bold py-4 px-8 rounded-xl transition-transform transform shadow-md ${state.verifications.stage1 ? 'hover:scale-105' : 'opacity-50 cursor-not-allowed'}">
                            Unlock Stage 2 (2031 – 2032)
                        </button>
                    </div>
                </div>
            `;
        };

        // ==========================================
        // STAGE 2: FREQUENCY
        // ==========================================
        const stage2View = () => {
            const p = state.currentBalance;
            const aS = state.stage2AnnualStatus;
            const mS = state.stage2MonthlyStatus;
            const annualBorder = aS === 'correct' ? 'border-green-400' : aS === 'incorrect' ? 'border-red-400' : 'border-slate-200';
            const monthlyBorder = mS === 'correct' ? 'border-green-400' : mS === 'incorrect' ? 'border-red-400' : 'border-slate-200';
            const annualInputBorder = aS === 'correct' ? 'border-green-500 bg-green-50' : aS === 'incorrect' ? 'border-red-500 bg-red-50' : 'border-slate-300';
            const monthlyInputBorder = mS === 'correct' ? 'border-green-500 bg-green-50' : mS === 'incorrect' ? 'border-red-500 bg-red-50' : 'border-slate-300';
            return `
            <div class="max-w-5xl mx-auto w-full">
                ${backBtn('stage1_correct')}
                <div class="text-center mb-8">
                    <span class="bg-indigo-100 text-indigo-800 px-3 py-1 rounded-full text-sm font-bold tracking-wide uppercase mb-3 inline-block">The Frequency Test</span>
                    <h2 class="text-3xl font-bold mb-2">Stage 2: 2031 – 2032 (2 Years)</h2>

        // --- ACTIONS ---
        const changeView = (newView) => { state.view = newView; render(); };

        const lockStage3 = () => { const c = state.stage3PendingChoice; state.stage3PendingChoice = null; processStage3(c); };

        const resetGame = () => {

        const replayStage3 = () => {

                const runNum = state.previousRuns.length + 1;
                state.previousRuns.push({
                    label: `Run ${runNum}`,

            state.stage3Choice = null; state.stage3Logs = []; state.finalBalance = 0; state.stage3PendingChoice = null;
            state.verifications.stage3 = false; state.verifications.rec_stage3_sel = false;
            state.calcInputs.stage3safe = ""; state.calcInputs.wheel = "";
            state.stage3SafeCalcError = false; state.pendingStage3Logs = []; state.pendingStage3Bal = 0;
            state.wheelData = { fundId: null, fundName: "", year: 2033, currentPrincipal: 0, accumulatedInterest: 0, bal: 0, isSpinning: false, currentRotation: 0, riskPct: 10, slicePattern: [], awaitingCalculation: false, pendingOutcome: null, calcError: false };

        };

        // STAGE 1
        const processStage1 = (fundId) => {
            if (fundId === 'A' || fundId === 'B') { changeView('stage1_wrong'); return; }
            let bal = state.initialBalance;
            let logs = [];
            for (let y = 2026; y <= 2030; y++) {
                let startBal = bal;
                let t = y - 2025;
                let interest = bal * 0.05;
                let stepWorking = `Step: ${formatMoney(startBal)} &times; 5.0% = +${formatMoney(interest)}`;
                let formulaStr = `${formatMoney(state.initialBalance)} &times; (1 + 5/100)<sup>${t}</sup>`;

            state.stage1Choice = "Fund C: Apex (5.0% p.a. Compound)";

            state.currentBalance = bal;

        // STAGE 2
        const checkStage2Both = () => {
            const annualStr = (document.getElementById('s2-annual-input')?.value || '').replace(/,/g, '').trim();
            const monthlyStr = (document.getElementById('s2-monthly-input')?.value || '').replace(/,/g, '').trim();

            const p = state.currentBalance;
            const targetAnnual = Math.round(p * Math.pow(1.03, 2) * 100) / 100;

            let monthlyBal = p;
            for (let i = 0; i < 24; i++) monthlyBal += monthlyBal * (0.0296 / 12);
            const targetMonthly = Math.round(monthlyBal * 100) / 100;

            const aDp = annualStr.split('.').length > 1 ? annualStr.split('.')[1].length : 0;
            const mDp = monthlyStr.split('.').length > 1 ? monthlyStr.split('.')[1].length : 0;

            let aStatus = null, mStatus = null, aMsg = '', mMsg = '';

            if (aDp !== 2) {
                aStatus = 'incorrect';
                aMsg = aDp === 0 ? 'Round to exactly 2 decimal places.' : aDp < 2 ? 'You only entered ' + aDp + ' decimal place — use exactly 2.' : 'Too many decimal places — round to exactly 2.';
            } else if (Math.abs(annualVal - targetAnnual) <= 0.01) {
                aStatus = 'correct';
            } else {
                aStatus = 'incorrect';
                const wrongAnnualMonthly = Math.round(p * Math.pow(1 + 0.03/12, 2) * 100) / 100;
                if (Math.abs(annualVal - wrongAnnualMonthly) <= 0.01) {
                    aMsg = 'For Annual compounding, r = 3 and n = 2. You do not divide r by 12 — that is only for monthly.';
                } else {
                    aMsg = 'Incorrect. Use A = P(1 + r/100)^n with r = 3 and n = 2.';
                }
            }

            if (mDp !== 2) {
                mStatus = 'incorrect';
                mMsg = mDp === 0 ? 'Round to exactly 2 decimal places.' : mDp < 2 ? 'You only entered ' + mDp + ' decimal place — use exactly 2.' : 'Too many decimal places — round to exactly 2.';
            } else if (Math.abs(monthlyVal - targetMonthly) <= 0.01) {
                mStatus = 'correct';
            } else {
                mStatus = 'incorrect';
                const wrongN2 = Math.round(p * Math.pow(1 + 0.0296/12, 2) * 100) / 100;
                const wrongR24 = Math.round(p * Math.pow(1.0296, 24) * 100) / 100;
                const wrongR2  = Math.round(p * Math.pow(1.0296, 2) * 100) / 100;
                if (Math.abs(monthlyVal - wrongN2) <= 0.01) {
                    mMsg = 'Check n. For monthly compounding over 2 years, n = 2 × 12 = 24 months, not 2.';
                } else if (Math.abs(monthlyVal - wrongR24) <= 0.02 || Math.abs(monthlyVal - wrongR2) <= 0.02) {
                    mMsg = 'Check r. For monthly compounding, r = 2.96 ÷ 12 (monthly rate %). You must divide the annual rate by 12.';
                } else {
                    mMsg = 'Incorrect. Use A = P(1 + r/100)^n with r = 2.96 ÷ 12 and n = 24.';
                }

            state.stage2AnnualStatus = aStatus;
            state.stage2MonthlyStatus = mStatus;
            state.stage2AnnualErrorMsg = aMsg;
            state.stage2MonthlyErrorMsg = mMsg;

            state.stage2MonthlyInput = monthlyStr;

            if (aStatus === 'correct' && mStatus === 'correct') {

        const proceedToStage2Correct = () => {

            state.stage2Choice = "The Monthly Saver (2.96% p.a. Monthly)";
            changeView('stage2_correct');
        };

        const checkAnalyzer = () => {
            const targetS = Math.round(state.currentBalance * 1.20 * 100) / 100;
            const targetD = Math.round(state.currentBalance * 0.80 * 100) / 100;

            const checkField = (inputId, stateInputKey, currentStatus, target, successLabel, failLabel) => {
                if (currentStatus === 'correct') return; // already verified, skip
                const rawStr = (document.getElementById(inputId)?.value || state[stateInputKey] || '').replace(/,/g, '').trim();
                state[stateInputKey] = rawStr;
                const val = parseFloat(rawStr);

                const dp = rawStr.split('.').length > 1 ? rawStr.split('.')[1].length : 0;
                if (dp !== 2) {
                    return `Round to exactly 2 decimal places.`;
                }
                if (Math.abs(val - target) <= 0.01) return null; // correct
                return `Incorrect. Calculate: Current Balance × ${failLabel}, rounded to 2 decimal places.`;
            };

            const sMsg = state.analyzerSStatus !== 'correct'
                ? checkField('analyze-success', 'analyzerSInput', state.analyzerSStatus, targetS, '+20%', '1.20')
                : null;
            const dMsg = state.analyzerDStatus !== 'correct'
                ? checkField('analyze-drop', 'analyzerDInput', state.analyzerDStatus, targetD, '-20%', '0.80')
                : null;

                if (sMsg === null) {
                    state.analyzerSStatus = 'correct';

                    state.analyzerSErrorMsg = '';
                } else {
                    state.analyzerSStatus = 'incorrect';
                    state.analyzerSErrorMsg = sMsg;
                }
            }
            if (state.analyzerDStatus !== 'correct') {
                if (dMsg === null) {
                    state.analyzerDStatus = 'correct';
                    state.analyzerCorrectD = targetD;

                } else {
                    state.analyzerDStatus = 'incorrect';

            render();

        // STAGE 3
        const processStage3 = (fundId) => {
            if (fundId === 'A') {
                let bal = state.currentBalance;
                let logs = [];
                for (let y = 2033; y <= 2035; y++) {
                    let startBal = bal;
                    let interest = bal * 0.025;

                    bal += interest;

                changeView('stage3_safe_calc');

                slices = slices.sort(() => Math.random() - 0.5);
                let gc = 0;
                slices = slices.map(s => { if (s === 'green') { gc++; return gc % 2 === 0 ? 'green1' : 'green2'; } return s; });
                state.wheelData = { fundId, fundName: fundId === 'B' ? "Market Accel (5.0% p.a. Compound)" : "Fun Tech (45.0% p.a. Compound)", year: 2033, currentPrincipal: state.currentBalance, accumulatedInterest: 0, bal: state.currentBalance, isSpinning: false, currentRotation: 0, riskPct, slicePattern: slices, awaitingCalculation: false, pendingOutcome: null, calcError: false };
                state.stage3Logs = [];

        };

        const spinWheel = () => {
            if (state.wheelData.isSpinning) return;
            state.wheelData.isSpinning = true; render();
            const riskPct = state.wheelData.riskPct;
            const success = Math.random() > (riskPct / 100);
            let validSliceIndices = [];
            state.wheelData.slicePattern.forEach((type, idx) => {
                if (success && type.startsWith('green')) validSliceIndices.push(idx);
                if (!success && type === 'red') validSliceIndices.push(idx);
            });
            const targetSliceIdx = validSliceIndices[Math.floor(Math.random() * validSliceIndices.length)];
            let targetDeg = (targetSliceIdx * 36) + (Math.random() * 20 - 10);
            if (targetDeg < 0) targetDeg += 360;
            const absoluteTarget = (360 - targetDeg) % 360;
            const currentMod = state.wheelData.currentRotation % 360;
            let rotationNeeded = absoluteTarget - currentMod;
            if (rotationNeeded < 0) rotationNeeded += 360;
            const finalRotation = state.wheelData.currentRotation + 360 * 4 + rotationNeeded;
            setTimeout(() => { state.wheelData.currentRotation = finalRotation; const el = document.getElementById('spin-wheel-element'); if (el) el.style.transform = `rotate(${finalRotation}deg)`; }, 50);
            setTimeout(() => { state.wheelData.pendingOutcome = success; state.wheelData.awaitingCalculation = true; state.wheelData.calcError = false; render(); }, 3050);
        };

        const checkWheelCalc = () => {

            targetVal = Math.round(targetVal * 100) / 100;

        const checkStage3SafeCalc = () => {

            state.calcInputs.stage3safe = inputEl.value;
            if (isNaN(inputVal)) return;
            const targetVal = Math.round(state.pendingStage3Bal * 100) / 100;
            if (Math.abs(inputVal - targetVal) <= 0.02) {
                state.stage3SafeCalcError = false; state.stage3Logs = state.pendingStage3Logs;
                state.finalBalance = state.pendingStage3Bal; state.stage3Choice = "Secure Haven (2.5% p.a. Compound)";
                changeView('final_result');
            } else { state.stage3SafeCalcError = true; render(); }
        };

        const processWheelOutcome = (success) => {
            let { fundId, bal, year } = state.wheelData;
            let startBal = bal;
            let interestRate = fundId === 'B' ? 0.05 : 0.45;
            let penaltyRate = fundId === 'B' ? 0.02 : 0.40;
            let workingStr = "";
            if (success) {
                let interest = bal * interestRate;
                workingStr = `Compound: ${formatMoney(bal)} &times; ${(interestRate * 100).toFixed(1)}% = +${formatMoney(interest)}`;
                bal += interest;
            } else {
                let penalty = bal * penaltyRate;
                workingStr = `Penalty: ${formatMoney(bal)} &times; ${(penaltyRate * 100).toFixed(1)}% = -${formatMoney(penalty)}`;
                bal -= penalty;
            }
            state.stage3Logs.push({ year, success, startBalance: startBal, endBalance: bal, working: workingStr });
            state.wheelData.bal = bal; state.wheelData.year += 1; state.wheelData.isSpinning = false;

        const finishWheelStage = () => { state.finalBalance = state.wheelData.bal; state.stage3Choice = state.wheelData.fundName; changeView('final_result'); };

        // --- COMPARISON CHART ---
        const computeWorstPath = () => {
            const initial = state.initialBalance;
            let points = [{ year: 2025, balance: initial }];
            let bal = initial;
            for (let y = 2026; y <= 2030; y++) { bal = initial + initial * 0.02 * (y - 2025); points.push({ year: y, balance: bal }); }
            let s2 = bal;
            for (let y = 2031; y <= 2032; y++) { bal = s2 * Math.pow(1.03, y - 2030); points.push({ year: y, balance: bal }); }
            let s3 = bal;
            for (let y = 2033; y <= 2035; y++) { bal = s3 * Math.pow(1.025, y - 2032); points.push({ year: y, balance: bal }); }
            return points;
        };

        const getStudentTrajectory = () => {
            let points = [{ year: 2025, balance: state.initialBalance }];
            state.stage1Logs.forEach(log => points.push({ year: log.year, balance: log.endBalance }));
            if (state.stage2Logs.length > 0) {
                state.stage2Logs.forEach(log => { if (log.period.endsWith('M12')) points.push({ year: parseInt(log.period), balance: log.endBalance }); });
            }
            state.stage3Logs.forEach(log => points.push({ year: log.year, balance: log.endBalance }));
            return points;
        };

        const drawComparisonChart = () => {
            const canvas = document.getElementById('comparison-chart');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);
            const w = rect.width, h = rect.height;
            const pad = { top: 40, right: 30, bottom: 50, left: 85 };
            const cw = w - pad.left - pad.right, ch = h - pad.top - pad.bottom;
            const studentData = getStudentTrajectory();
            const worstData = computeWorstPath();
            const prevRunColors = ['#8b5cf6', '#f97316'];
            const prevRunData = state.previousRuns.map(run => [
                { year: 2032, balance: run.startBalance },
                ...run.logs.map(l => ({ year: l.year, balance: l.balance }))
            ]);
            const allBals = [...studentData.map(d => d.balance), ...worstData.map(d => d.balance),
                ...prevRunData.flatMap(d => d.map(p => p.balance))];
            const maxBal = Math.max(...allBals) * 1.1;
            const minBal = Math.min(...allBals, state.initialBalance) * 0.92;
            const xScale = (yr) => pad.left + ((yr - 2025) / 10) * cw;
            const yScale = (b) => pad.top + ch - ((b - minBal) / (maxBal - minBal)) * ch;

            ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, w, h);

            // Grid
            ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 1;
            for (let i = 0; i <= 5; i++) {
                const val = minBal + (maxBal - minBal) * (i / 5);
                const y = yScale(val);
                ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(w - pad.right, y); ctx.stroke();
                ctx.fillStyle = '#94a3b8'; ctx.font = '11px Inter, sans-serif'; ctx.textAlign = 'right';
                ctx.fillText('$' + Math.round(val).toLocaleString(), pad.left - 8, y + 4);
            }

            // X labels
            ctx.fillStyle = '#64748b'; ctx.font = '11px Inter, sans-serif'; ctx.textAlign = 'center';
            for (let yr = 2025; yr <= 2035; yr++) {
                const x = xScale(yr);
                ctx.fillText(yr.toString(), x, h - pad.bottom + 20);
                ctx.strokeStyle = '#f1f5f9'; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(x, pad.top); ctx.lineTo(x, pad.top + ch); ctx.stroke();
            }

            // Stage boundaries
            ctx.strokeStyle = '#cbd5e1'; ctx.lineWidth = 1; ctx.setLineDash([5, 5]);
            [2030.5, 2032.5].forEach(yr => { const x = xScale(yr); ctx.beginPath(); ctx.moveTo(x, pad.top); ctx.lineTo(x, pad.top + ch); ctx.stroke(); });
            ctx.setLineDash([]);

            // Stage labels
            ctx.fillStyle = '#94a3b8'; ctx.font = '10px Inter, sans-serif'; ctx.textAlign = 'center';
            ctx.fillText('Stage 1', xScale(2027.5), pad.top - 8);
            ctx.fillText('Stage 2', xScale(2031.5), pad.top - 8);
            ctx.fillText('Stage 3', xScale(2034), pad.top - 8);

            const drawLine = (data, color, lw, dashed = false) => {
                ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = lw;
                if (dashed) ctx.setLineDash([6, 4]); else ctx.setLineDash([]);
                data.forEach((d, i) => { const x = xScale(d.year), y = yScale(d.balance); i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); });
                ctx.stroke();
                ctx.setLineDash([]);
                data.forEach(d => {
                    ctx.beginPath(); ctx.fillStyle = color; ctx.arc(xScale(d.year), yScale(d.balance), 4, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.fillStyle = '#fff'; ctx.arc(xScale(d.year), yScale(d.balance), 2, 0, Math.PI * 2); ctx.fill();
                });
            };

            drawLine(worstData, '#ef4444', 2.5);
            prevRunData.forEach((data, i) => drawLine(data, prevRunColors[i], 2, true));
            drawLine(studentData, '#22c55e', 3);

            // End labels
            const se = studentData[studentData.length - 1], we = worstData[worstData.length - 1];
            ctx.font = 'bold 12px Inter, sans-serif'; ctx.textAlign = 'left';
            let sy = yScale(se.balance) - 10, wy = yScale(we.balance) + 18;
            if (Math.abs(sy - wy) < 20) { sy -= 4; wy += 4; }
            ctx.fillStyle = '#22c55e'; ctx.fillText(formatMoney(se.balance), xScale(se.year) - 40, sy);
            ctx.fillStyle = '#ef4444'; ctx.fillText(formatMoney(we.balance), xScale(we.year) - 40, wy);
            prevRunData.forEach((data, i) => {
                const last = data[data.length - 1];
                ctx.fillStyle = prevRunColors[i];
                ctx.fillText(formatMoney(last.balance), xScale(last.year) - 40, yScale(last.balance) - 10);
            });

            // Legend
            const lx = pad.left + 10, ly = pad.top + 8;
            const legendRows = [
                { color: '#22c55e', label: `Your Journey (Run ${state.previousRuns.length + 1})`, dashed: false },
                ...state.previousRuns.map((run, i) => ({ color: prevRunColors[i], label: `Run ${run.label.replace('Run ', '')}: ${run.fundName}`, dashed: true })),
                { color: '#ef4444', label: 'Lowest Returns', dashed: false },
            ];
            ctx.font = '11px Inter, sans-serif'; ctx.textAlign = 'left';
            legendRows.forEach((row, i) => {
                const rowY = ly + i * 18;
                if (row.dashed) { ctx.setLineDash([5, 3]); ctx.strokeStyle = row.color; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(lx, rowY + 2); ctx.lineTo(lx + 14, rowY + 2); ctx.stroke(); ctx.setLineDash([]); }
                else { ctx.fillStyle = row.color; ctx.fillRect(lx, rowY, 14, 3); }
                ctx.fillStyle = '#334155'; ctx.fillText(row.label, lx + 20, rowY + 5);
            });
        };

        // --- DEV SKIP HELPER ---
        window.skip = () => {
            const v = state.view;

            const fill = (id, val) => {
                const el = document.getElementById(id);
                if (el) el.value = val.toFixed(2);
            };

            if (v === 'stage2') {
                const p = state.currentBalance;
                const targetAnnual = Math.round(p * Math.pow(1.03, 2) * 100) / 100;
                let mb = p;
                for (let i = 0; i < 24; i++) mb += mb * (0.0296 / 12);
                const targetMonthly = Math.round(mb * 100) / 100;
                fill('s2-annual-input', targetAnnual);
                fill('s2-monthly-input', targetMonthly);
                checkStage2Both();

            } else if (v === 'stage3_lesson') {
                const targetS = Math.round(state.currentBalance * 1.20 * 100) / 100;
                const targetD = Math.round(state.currentBalance * 0.80 * 100) / 100;
                fill('analyze-success', targetS);
                fill('analyze-drop', targetD);
                state.analyzerSInput = targetS.toFixed(2);
                state.analyzerDInput = targetD.toFixed(2);
                checkAnalyzer();

            } else if (v === 'stage3_safe_calc') {
                const targetVal = Math.round(state.pendingStage3Bal * 100) / 100;
                fill('stage3-safe-calc-input', targetVal);
                if (!state.calcInputs) state.calcInputs = {};
                state.calcInputs.stage3safe = targetVal.toFixed(2);
                checkStage3SafeCalc();

            } else if (v === 'stage3_wheel' && state.wheelData.awaitingCalculation) {
                const { fundId, bal, pendingOutcome } = state.wheelData;
                let targetVal = pendingOutcome
                    ? bal * (1 + (fundId === 'B' ? 0.05 : 0.45))
                    : bal * (1 - (fundId === 'B' ? 0.02 : 0.40));
                targetVal = Math.round(targetVal * 100) / 100;
                fill('wheel-calc-input', targetVal);
                if (!state.calcInputs) state.calcInputs = {};
                state.calcInputs.wheel = targetVal.toFixed(2);
                checkWheelCalc();

            } else {
                console.log('skip(): no calculation to fill on current view "' + v + '"'
                    + (v === 'stage3_wheel' ? ' (spin the wheel first)' : ''));
            }
        };

        // --- INITIALIZE ---
        render();
    </script>
</body>
</html>
